services:

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - backend

  app:
    build: ./app
    image: devops-lab:v1
    environment:
      - REDIS_HOST=redis
    networks:
      - backend
    depends_on:
      - redis

  nginx:
    build: ./nginx
    ports:
      - "80:80"
    networks:
      - backend
    depends_on:
      - app

volumes:
  redis_data:

networks:
  backend:
    driver: bridge
